services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-chill-radio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radio}
      POSTGRES_USER: ${POSTGRES_USER:-radio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - radio-postgres:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-127.0.0.1:5432}:5432"

  radio:
    build: .
    container_name: ai-chill-radio
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-127.0.0.1:3000}:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-radio}
      POSTGRES_USER: ${POSTGRES_USER:-radio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
      MUSIC_DIR: /music
      LIVE_MUSIC_DIR: /music/live
      PLAY_MUSIC_DIR: /music/play
      CACHE_DIR: /cache/announcements
      ARCHIVE_DIR: /cache/archive
      LOG_DIR: /cache/logs
      ADMIN_CONFIG_PATH: /cache/config/admin.json
      FACT_LOG_PATH: /cache/config/fact-log.json
      TOPIC_CYCLE_STATE_PATH: /cache/config/topic-cycle.json
      LISTENER_STORE_PATH: /cache/config/listeners.json
      PUBLIC_RADIO_URL: ${PUBLIC_RADIO_URL:-http://localhost:3000}
      PUBLIC_SERVER_IP: ${PUBLIC_SERVER_IP:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LISTENER_API_TOKEN: ${LISTENER_API_TOKEN}
      LISTENER_ALLOWED_TELEGRAM_IDS: ${LISTENER_ALLOWED_TELEGRAM_IDS:-}
      LISTENER_ALLOWED_USERNAMES: ${LISTENER_ALLOWED_USERNAMES:-}
      LISTENER_UNLIMITED_TELEGRAM_IDS: ${LISTENER_UNLIMITED_TELEGRAM_IDS:-}
      LISTENER_UNLIMITED_USERNAMES: ${LISTENER_UNLIMITED_USERNAMES:-}
      LISTENER_ADMIN_TELEGRAM_IDS: ${LISTENER_ADMIN_TELEGRAM_IDS:-}
      LISTENER_ADMIN_USERNAMES: ${LISTENER_ADMIN_USERNAMES:-}
    volumes:
      - ./music:/music:ro
      - radio-cache:/cache

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ai-chill-radio-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      radio:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

  quick-tunnel:
    build:
      context: .
      dockerfile: Dockerfile.quick-tunnel
    container_name: ai-chill-radio-quick-tunnel
    restart: unless-stopped
    profiles: ["quick-tunnel"]
    depends_on:
      radio:
        condition: service_healthy
    environment:
      PUBLIC_URL_STATE_PATH: /cache/config/public-url.json
    volumes:
      - radio-cache:/cache

volumes:
  radio-cache:
  radio-postgres:
