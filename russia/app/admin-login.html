<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход в ЛК админа</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app login-app">
      <section class="player login-panel">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>ЛК админа</h1>
            <p>AI Chill Radio</p>
          </div>
        </div>

        <form class="login-form" method="post" action="/api/admin/login">
          <label>
            <span>Логин</span>
            <input name="username" type="text" autocomplete="username" value="admin" required autofocus>
          </label>
          <label>
            <span>Пароль</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <p class="login-error">Неверный логин или пароль</p>
          <button class="primary-action login-submit" type="submit">Войти</button>
        </form>

        <a class="admin-link login-back" href="/">Страница слушателя</a>
      </section>
    </main>
    <script>
      if (new URLSearchParams(location.search).get("error")) {
        document.documentElement.dataset.loginError = "true";
      }
    </script>
  </body>
</html>
