services:
  radio:
    build: .
    container_name: ai-chill-radio
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      MUSIC_DIR: /music
      LIVE_MUSIC_DIR: /music/live
      PLAY_MUSIC_DIR: /music/play
      CACHE_DIR: /cache/announcements
      ARCHIVE_DIR: /cache/archive
      LOG_DIR: /cache/logs
      ADMIN_CONFIG_PATH: /cache/config/admin.json
      FACT_LOG_PATH: /cache/config/fact-log.json
      LISTENER_STORE_PATH: /cache/config/listeners.json
      PUBLIC_RADIO_URL: ${PUBLIC_RADIO_URL:-http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LISTENER_API_TOKEN: ${LISTENER_API_TOKEN}
      LISTENER_ALLOWED_TELEGRAM_IDS: ${LISTENER_ALLOWED_TELEGRAM_IDS:-}
      LISTENER_ALLOWED_USERNAMES: ${LISTENER_ALLOWED_USERNAMES:-}
      LISTENER_UNLIMITED_TELEGRAM_IDS: ${LISTENER_UNLIMITED_TELEGRAM_IDS:-}
      LISTENER_UNLIMITED_USERNAMES: ${LISTENER_UNLIMITED_USERNAMES:-}
      LISTENER_ADMIN_TELEGRAM_IDS: ${LISTENER_ADMIN_TELEGRAM_IDS:-}
      LISTENER_ADMIN_USERNAMES: ${LISTENER_ADMIN_USERNAMES:-}
    volumes:
      - ./music:/music:ro
      - radio-cache:/cache

  telegram-bot:
    build: .
    container_name: ai-chill-radio-bot
    restart: unless-stopped
    depends_on:
      radio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RADIO_INTERNAL_URL: http://radio:3000
      PUBLIC_RADIO_URL: ${PUBLIC_RADIO_URL:-http://localhost:3000}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      LISTENER_API_TOKEN: ${LISTENER_API_TOKEN}
      BOT_ALLOWED_TELEGRAM_IDS: ${BOT_ALLOWED_TELEGRAM_IDS:-}
      BOT_ALLOWED_USERNAMES: ${BOT_ALLOWED_USERNAMES:-}
      BOT_ADMIN_TELEGRAM_IDS: ${BOT_ADMIN_TELEGRAM_IDS:-}
      BOT_ADMIN_USERNAMES: ${BOT_ADMIN_USERNAMES:-}
      BOT_NOTIFY_CHAT_IDS: ${BOT_NOTIFY_CHAT_IDS:-}
      BOT_LINK_STATE_PATH: /cache/config/bot-link.json
      PUBLIC_URL_STATE_PATH: /cache/config/public-url.json
      LISTENER_STORE_PATH: /cache/config/listeners.json
    volumes:
      - radio-cache:/cache
    command: ["node", "bot/bot.js"]
    healthcheck:
      disable: true

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ai-chill-radio-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      radio:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

  quick-tunnel:
    build:
      context: .
      dockerfile: Dockerfile.quick-tunnel
    container_name: ai-chill-radio-quick-tunnel
    restart: unless-stopped
    profiles: ["quick-tunnel"]
    depends_on:
      radio:
        condition: service_healthy
    environment:
      PUBLIC_URL_STATE_PATH: /cache/config/public-url.json
    volumes:
      - radio-cache:/cache

volumes:
  radio-cache:
